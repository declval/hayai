<!DOCTYPE html>
<html>
    <head>
        <title>Hayai</title>
        <link href="stylesheet.css" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
        <script src="main.js" type="module"></script>
    </head>
    <body>
        <div class="text"></div>
        <div class="keyboard">
            <div class="keyboard-row">
                <div class="keyboard-key" data-value="`" data-value-alt="~">`<div class="keyboard-key-alt">~</div></div>
                <div class="keyboard-key" data-value="1" data-value-alt="!">1<div class="keyboard-key-alt">!</div></div>
                <div class="keyboard-key" data-value="2" data-value-alt="@">2<div class="keyboard-key-alt">@</div></div>
                <div class="keyboard-key" data-value="3" data-value-alt="#">3<div class="keyboard-key-alt">#</div></div>
                <div class="keyboard-key" data-value="4" data-value-alt="$">4<div class="keyboard-key-alt">$</div></div>
                <div class="keyboard-key" data-value="5" data-value-alt="%">5<div class="keyboard-key-alt">%</div></div>
                <div class="keyboard-key" data-value="6" data-value-alt="^">6<div class="keyboard-key-alt">^</div></div>
                <div class="keyboard-key" data-value="7" data-value-alt="&">7<div class="keyboard-key-alt">&</div></div>
                <div class="keyboard-key" data-value="8" data-value-alt="*">8<div class="keyboard-key-alt">*</div></div>
                <div class="keyboard-key" data-value="9" data-value-alt="(">9<div class="keyboard-key-alt">(</div></div>
                <div class="keyboard-key" data-value="0" data-value-alt=")">0<div class="keyboard-key-alt">)</div></div>
                <div class="keyboard-key" data-value="-" data-value-alt="_">-<div class="keyboard-key-alt">_</div></div>
                <div class="keyboard-key" data-value="=" data-value-alt="+">=<div class="keyboard-key-alt">+</div></div>
                <div class="keyboard-key" data-value="Backspace">Backspace</div>
            </div>
            <div class="keyboard-row">
                <div class="keyboard-key keyboard-key-tab" data-value="Tab">Tab</div>
                <div class="keyboard-key" data-value="q" data-value-alt="Q">Q</div>
                <div class="keyboard-key" data-value="w" data-value-alt="W">W</div>
                <div class="keyboard-key" data-value="e" data-value-alt="E">E</div>
                <div class="keyboard-key" data-value="r" data-value-alt="R">R</div>
                <div class="keyboard-key" data-value="t" data-value-alt="T">T</div>
                <div class="keyboard-key" data-value="y" data-value-alt="Y">Y</div>
                <div class="keyboard-key" data-value="u" data-value-alt="U">U</div>
                <div class="keyboard-key" data-value="i" data-value-alt="I">I</div>
                <div class="keyboard-key" data-value="o" data-value-alt="O">O</div>
                <div class="keyboard-key" data-value="p" data-value-alt="P">P</div>
                <div class="keyboard-key" data-value="[" data-value-alt="{">[<div class="keyboard-key-alt">{</div></div>
                <div class="keyboard-key" data-value="]" data-value-alt="}">]<div class="keyboard-key-alt">}</div></div>
                <div class="keyboard-key" data-value="\" data-value-alt="|">\<div class="keyboard-key-alt">|</div></div>
            </div>
            <div class="keyboard-row">
                <div class="keyboard-key keyboard-key-caps" data-value="CapsLock">Caps Lock<div class="keyboard-key-caps-indicator"></div></div>
                <div class="keyboard-key" data-value="a" data-value-alt="A">A</div>
                <div class="keyboard-key" data-value="s" data-value-alt="S">S</div>
                <div class="keyboard-key" data-value="d" data-value-alt="D">D</div>
                <div class="keyboard-key" data-value="f" data-value-alt="F">F</div>
                <div class="keyboard-key" data-value="g" data-value-alt="G">G</div>
                <div class="keyboard-key" data-value="h" data-value-alt="H">H</div>
                <div class="keyboard-key" data-value="j" data-value-alt="J">J</div>
                <div class="keyboard-key" data-value="k" data-value-alt="K">K</div>
                <div class="keyboard-key" data-value="l" data-value-alt="L">L</div>
                <div class="keyboard-key" data-value=";" data-value-alt=":">;<div class="keyboard-key-alt">:</div></div>
                <div class="keyboard-key" data-value="'" data-value-alt="&quot;">'<div class="keyboard-key-alt">"</div></div>
                <div class="keyboard-key keyboard-key-enter" data-value="Enter">Enter</div>
            </div>
            <div class="keyboard-row">
                <div class="keyboard-key keyboard-key-shift" data-value="Shift">Shift</div>
                <div class="keyboard-key" data-value="z" data-value-alt="Z">Z</div>
                <div class="keyboard-key" data-value="x" data-value-alt="X">X</div>
                <div class="keyboard-key" data-value="c" data-value-alt="C">C</div>
                <div class="keyboard-key" data-value="v" data-value-alt="V">V</div>
                <div class="keyboard-key" data-value="b" data-value-alt="B">B</div>
                <div class="keyboard-key" data-value="n" data-value-alt="N">N</div>
                <div class="keyboard-key" data-value="m" data-value-alt="M">M</div>
                <div class="keyboard-key" data-value="," data-value-alt="&lt;">,<div class="keyboard-key-alt">&lt;</div></div>
                <div class="keyboard-key" data-value="." data-value-alt="&gt;">.<div class="keyboard-key-alt">&gt;</div></div>
                <div class="keyboard-key" data-value="/" data-value-alt="?">/<div class="keyboard-key-alt">?</div></div>
                <div class="keyboard-key keyboard-key-shift" data-value="Shift">Shift</div>
            </div>
            <div class="keyboard-row">
                <div class="keyboard-key keyboard-key-ctrl-win-alt" data-value="Control">Ctrl</div>
                <div class="keyboard-key keyboard-key-ctrl-win-alt" data-value="Meta">Win</div>
                <div class="keyboard-key keyboard-key-ctrl-win-alt" data-value="Alt">Alt</div>
                <div class="keyboard-key keyboard-key-space" data-value=" ">Space</div>
                <div class="keyboard-key keyboard-key-ctrl-win-alt" data-value="Alt">Alt</div>
                <div class="keyboard-key keyboard-key-ctrl-win-alt" data-value="Control">Ctrl</div>
            </div>
        </div>
        <div class="material-symbols-outlined settings-button">settings</div>
        <div class="settings">
            <div class="settings-titlebar">
                <div>Settings</div>
                <div class="material-symbols-outlined settings-close">close</div>
            </div>
            <form class="settings-form">
                <label class="settings-label" for="settings-usertext">Custom text</label>
                <textarea class="settings-usertext" id="settings-usertext" placeholder="Enter your text here"></textarea>
                <button class="settings-save" type="submit">Save</button>
            </form>
        </div>
    </body>
</html>
