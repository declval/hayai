<!DOCTYPE html>
<html>
    <head>
        <title>Hayai</title>
        <link href="stylesheet.css" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
        <script src="main.js"></script>
    </head>
    <body>
        <div class="text"></div>
        <div class="keyboard">
            <div class="keyboard-row">
                <div class="keyboard-key" data-value="`">`</div>
                <div class="keyboard-key" data-value="1">1</div>
                <div class="keyboard-key" data-value="2">2</div>
                <div class="keyboard-key" data-value="3">3</div>
                <div class="keyboard-key" data-value="4">4</div>
                <div class="keyboard-key" data-value="5">5</div>
                <div class="keyboard-key" data-value="6">6</div>
                <div class="keyboard-key" data-value="7">7</div>
                <div class="keyboard-key" data-value="8">8</div>
                <div class="keyboard-key" data-value="9">9</div>
                <div class="keyboard-key" data-value="0">0</div>
                <div class="keyboard-key" data-value="-">-</div>
                <div class="keyboard-key" data-value="=">=</div>
                <div class="keyboard-key" data-value="Backspace">Backspace</div>
            </div>
            <div class="keyboard-row">
                <div class="keyboard-key keyboard-key-tab" data-value="Tab">Tab</div>
                <div class="keyboard-key" data-value="Q">Q</div>
                <div class="keyboard-key" data-value="W">W</div>
                <div class="keyboard-key" data-value="E">E</div>
                <div class="keyboard-key" data-value="R">R</div>
                <div class="keyboard-key" data-value="T">T</div>
                <div class="keyboard-key" data-value="Y">Y</div>
                <div class="keyboard-key" data-value="U">U</div>
                <div class="keyboard-key" data-value="I">I</div>
                <div class="keyboard-key" data-value="O">O</div>
                <div class="keyboard-key" data-value="P">P</div>
                <div class="keyboard-key" data-value="[">[</div>
                <div class="keyboard-key" data-value="]">]</div>
                <div class="keyboard-key" data-value="\">\</div>
            </div>
            <div class="keyboard-row">
                <div class="keyboard-key keyboard-key-caps" data-value="CapsLock">Caps Lock</div>
                <div class="keyboard-key" data-value="A">A</div>
                <div class="keyboard-key" data-value="S">S</div>
                <div class="keyboard-key" data-value="D">D</div>
                <div class="keyboard-key" data-value="F">F</div>
                <div class="keyboard-key" data-value="G">G</div>
                <div class="keyboard-key" data-value="H">H</div>
                <div class="keyboard-key" data-value="J">J</div>
                <div class="keyboard-key" data-value="K">K</div>
                <div class="keyboard-key" data-value="L">L</div>
                <div class="keyboard-key" data-value=";">;</div>
                <div class="keyboard-key" data-value="'">'</div>
                <div class="keyboard-key keyboard-key-enter" data-value="Enter">Enter</div>
            </div>
            <div class="keyboard-row">
                <div class="keyboard-key keyboard-key-shift" data-value="Shift">Shift</div>
                <div class="keyboard-key" data-value="Z">Z</div>
                <div class="keyboard-key" data-value="X">X</div>
                <div class="keyboard-key" data-value="C">C</div>
                <div class="keyboard-key" data-value="V">V</div>
                <div class="keyboard-key" data-value="B">B</div>
                <div class="keyboard-key" data-value="N">N</div>
                <div class="keyboard-key" data-value="M">M</div>
                <div class="keyboard-key" data-value=",">,</div>
                <div class="keyboard-key" data-value=".">.</div>
                <div class="keyboard-key" data-value="/">/</div>
                <div class="keyboard-key keyboard-key-shift" data-value="Shift">Shift</div>
            </div>
            <div class="keyboard-row">
                <div class="keyboard-key keyboard-key-ctrl-win-alt" data-value="Control">Ctrl</div>
                <div class="keyboard-key keyboard-key-ctrl-win-alt" data-value="Meta">Win</div>
                <div class="keyboard-key keyboard-key-ctrl-win-alt" data-value="Alt">Alt</div>
                <div class="keyboard-key keyboard-key-space" data-value=" ">Space</div>
                <div class="keyboard-key keyboard-key-ctrl-win-alt" data-value="Alt">Alt</div>
                <div class="keyboard-key keyboard-key-ctrl-win-alt" data-value="Control">Ctrl</div>
            </div>
        </div>
        <div class="material-symbols-outlined settings-button">settings</div>
        <div class="settings">
            <div class="settings-titlebar">
                <div>Settings</div>
                <div class="material-symbols-outlined settings-close">close</div>
            </div>
            <form class="settings-form">
                <label class="settings-label" for="settings-usertext">Custom text</label>
                <textarea class="settings-usertext" id="settings-usertext" placeholder="Enter your text here"></textarea>
                <button class="settings-save" type="submit">Save</button>
            </form>
        </div>
    </body>
</html>
